<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Dark cyber background, matching the app theme (#070b12 / #0e1726). -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <!-- Neon cyan -> green, matching the progress bar. -->
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background tile. -->
  <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#bg)"/>
  <rect x="3" y="3" width="250" height="250" rx="50" fill="none"
        stroke="#00e5ff" stroke-opacity="0.55" stroke-width="3"/>
  <circle cx="128" cy="128" r="96" fill="url(#glow)"/>

  <!-- Two peer nodes (sender / receiver). -->
  <g stroke="url(#flow)" stroke-width="6" fill="#0c1a2b">
    <rect x="40" y="40" width="58" height="58" rx="14"/>
    <rect x="158" y="158" width="58" height="58" rx="14"/>
  </g>
  <circle cx="69" cy="69" r="11" fill="url(#flow)"/>
  <circle cx="187" cy="187" r="11" fill="url(#flow)"/>

  <!-- Bidirectional transfer arrows between the nodes. -->
  <g fill="none" stroke="url(#flow)" stroke-width="12" stroke-linecap="round">
    <path d="M150 90 L98 142"/>
    <path d="M106 166 L158 114"/>
  </g>
  <g fill="url(#flow)">
    <!-- arrowhead pointing down-left toward the lower node -->
    <path d="M92 148 L116.3 140.5 L99.5 123.7 Z"/>
    <!-- arrowhead pointing up-right toward the upper node -->
    <path d="M164 108 L139.7 115.5 L156.5 132.3 Z"/>
  </g>

  <!-- Small PQ shield accent (post-quantum). -->
  <g transform="translate(128,128)">
    <path d="M0 -30 L24 -20 L24 4 Q24 26 0 34 Q-24 26 -24 4 L-24 -20 Z"
          fill="#070b12" stroke="url(#flow)" stroke-width="5"/>
    <text x="0" y="9" text-anchor="middle" font-family="monospace"
          font-size="26" font-weight="bold" fill="url(#flow)">Q</text>
  </g>
</svg>
